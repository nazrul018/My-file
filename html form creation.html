<!DOCTYPE html>
<html>
    <head>
        <title>HTML FORM</title>
        <link rel="shortcut icon" href="picbg.png" type="image/x-icon"
        <body>
            <h1>Create Your New Id</h1><hr>
            <form>
               Name: <input type="text" placeholder="Enter Your Name"><br>
                
               Birth: <input type="date" min="2000-01-01" max="2026-12-01"><br>
            
               Email: <input type="email" placeholder="Email" required><br>
               Gender: 
               <input type="radio" name="n"> Male
               <input type="radio" name="n"> Female
               <input type="radio" name="n"> Other 
               <br>
               Nationality: 
               <select>
                <option>Please Select</option>
                <option>Bangladesh</option>
                <option>India</option>
                <option>China</option>
               </select>
               <br>
               Property <input type="checkbox"> Laptop
               <input type="checkbox"> PC
               <input type="checkbox"> Macbook 
               <br>
               HSC GPA: <input type="number" min="1" max="5.00" value="5"><br>
               
               Your Range: <input type="range" max="7"><br>
               
               Choice color: <input type="color" value="ff0000"><br>
               Meeting date and time: <input type="datetime-local"><br>
               Month: <input type="month"><br>
               <input type="file" accept=".jpg"><br>
               <dt>Say something about your self:</dt>
               <textarea cols="30" rows="auto" placeholder="Text here"></textarea><br>
            <input type="submit" value="Registration">
            <input type="reset">
            </form>

        </body>
    </head>
</html>
