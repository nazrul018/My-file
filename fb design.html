<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="fontawesome-free-7.2.0-web/css/fontawesome.min.css">
     <link rel="stylesheet" href="fontawesome-free-7.2.0-web/css/all.min.css"> 
     <link rel="shortcut icon" href="fbimg.png" type="image/x-icon">
<title>Facebook design</title>

   <style>
    body{
        font-family: sans-serif;
        margin: 10px;
        
    }
        .main .logo{
        /* box-shadow: 0 2px 5px; */
        height:120px;
        display: block;
        text-align: center;
        /* border: 1px solid black; */
    }
    .fa-brands{
        color: rgb(1, 106, 212);
        margin-top: 60px;
        font-size: 60px;

    }
    .hr{
        color: rgba(0, 0, 0, 0.486)
    }
    .main{
        /* height: 500px; */
        width: 60%;
        border: 1px solid black;
        display: inline-block;
        overflow:-moz-hidden-unscrollable;
        
    }
    .title{ 
        text-align: center;
        margin-top: 70px;
    }
    .user{
        display: block;
        margin: 5px auto;
        height: 50px;
        width: 400px;
        border-radius: 10px;
        font-size: 16px;
        border: 2px solid rgba(0, 0, 0, 0.2);
    }
.pass{
     display: block;
        margin: 5px auto;
        margin-top: 20px;
        height: 50px;
        width: 400px;
        border-radius: 10px;
        font-size: 16px;
        border: 2px solid rgba(0, 0, 0, 0.2);
}
    .user:hover, .pass:hover{
    border: 1px solid black;

}


.login{
    display: block;
    margin: 10px auto;
    margin-top: 30px;
    height: 40px;
    width: 400px;
    background:rgb(48, 115, 214);
    border-radius: 20px;
    color: white;
    font-size: 20px;
}
.forgotten{
    display: block;
    text-decoration: none ;
    color: black;
    margin: 10px auto;
    text-align: center;

}
.new{
     display: block;
    margin: 50px auto;
    /* margin-top: 30px; */
    height: 40px;
    width: 400px;
    border-radius: 20px;
    font-size: 16px;
    color:rgb(48, 115, 214);
    border:1px solid rgb(48, 115, 214);
    background: white;

}
.second{
    display: inline-block;
    width: 38%;
    margin-bottom: 0;
}
.second p{
    margin-left: 40px;
    font-size: 20px;
    font-style: oblique;
    font-weight: bold;
    writing-mode: vertical-lr;
    
}
.second img{
    margin-bottom: 10px;
    width: 100%;
    height: 300px;
}

    </style>
</head>
<body>
    <form action="">
        <div class="main">
            <div class="logo">
                <i class="fa-brands fa-facebook fa-2xl"></i>
            </div>
            <hr class="hr">
            <p class="title">Log into Facebook</p>
            <input class="user" type="text" placeholder="  Email address or mobile number">
            <input class="pass" type="  password" placeholder="  password">
            <input type="submit" class="login" value="Log in">
            <a href="" class="forgotten">Forgotten password?</a>
            <input type="submit" class="new" value="Create new account">
        </div>
        <div class="second">
            <p>Enjoy with your friends</p>
            <img src="map.jpg" alt="">
        </div>

    </form>
   
</body>
</html>
